<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>来泼水吧 💦 Bangkok Songkran 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0014;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.08);
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff00e5;
    --neon-pink: #ff2d7b;
    --neon-yellow: #ffe600;
    --neon-green: #39ff14;
    --neon-orange: #ff6b00;
    --neon-blue: #4d4dff;
    --neon-purple: #b44dff;
    --text-w: #ffffff;
    --text-dim: rgba(255,255,255,0.5);
    --text-muted: rgba(255,255,255,0.3);
    --glass-border: rgba(255,255,255,0.1);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; padding: 0;
    background: var(--bg-deep);
    color: var(--text-w);
    font-family: 'Exo 2', sans-serif;
    overflow-x: hidden;
    line-height: 1.5;
    touch-action: manipulation;
  }

  /* 背景动画 */
  #backgroundContainer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; overflow: hidden; pointer-events: none;
  }
  .glow-orb {
    position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.3;
    transition: background 1.5s ease;
  }
  #cursorSpot {
    position: absolute; width: 500px; height: 500px; border-radius: 50%;
    filter: blur(80px); opacity: 0.15; pointer-events: none; z-index: 0;
  }

  .container { max-width: 1000px; margin: 0 auto; padding: 20px; position: relative; }

  header { text-align: center; padding: 60px 0 40px; }
  .logo-text {
    font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900;
    letter-spacing: 5px; text-transform: uppercase; margin: 0;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-cyan));
    background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shine 5s linear infinite; filter: drop-shadow(0 0 10px rgba(0,240,255,0.3));
  }
  @keyframes shine { to { background-position: 200% center; } }

  .hero-tag { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--text-dim); display: block; margin-top: 10px; }
  .hero-date { display: inline-block; margin-top: 25px; padding: 8px 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 50px; color: var(--neon-yellow); font-size: 0.85rem; }

  .section-title { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; margin: 40px 0 10px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--glass-border), transparent); }
  .section-sub { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 25px; }

  /* 酒店卡片 */
  .hotel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
  .hotel-card {
    background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px;
    padding: 20px; backdrop-filter: blur(10px); transition: 0.3s; position: relative; overflow: hidden;
  }
  .hotel-card.selected { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,240,255,0.15); }
  .price-tag { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--neon-yellow); }

  /* 房间与人员 */
  .room-block { background: rgba(255,255,255,0.03); border: 1px dashed var(--glass-border); border-radius: 15px; padding: 20px; margin-bottom: 15px; }
  .room-slots { display: flex; flex-wrap: wrap; gap: 10px; min-height: 50px; align-items: center; }
  
  .person-chip {
    padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border); font-size: 0.85rem; cursor: pointer;
    display: flex; align-items: center; gap: 8px; transition: 0.2s; user-select: none;
  }
  /* 手机选中态发光 */
  .person-chip.active-touch {
    border-color: var(--neon-cyan) !important;
    box-shadow: 0 0 15px var(--neon-cyan);
    transform: scale(1.05);
  }
  .remove-btn { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 10px; }

  /* 记账模块 */
  .exp-input { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
  .part-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
  .part-badge:has(input:checked) { background: rgba(0, 240, 255, 0.1); border-color: var(--neon-cyan); color: var(--neon-cyan); }
  .part-badge input { display: none; }

  /* 底部栏 */
  .summary-bar { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px; background: rgba(10, 0, 20, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); z-index: 100; }
  .summary-btn { background: white; color: black; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 800; font-family: 'Orbitron'; cursor: pointer; }

  /* 弹窗 */
  #modalOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-content { background: #150025; border: 1px solid var(--neon-cyan); border-radius: 25px; width: 100%; max-width: 500px; padding: 30px; position: relative; }
  
  #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--neon-magenta); color: white; padding: 10px 20px; border-radius: 50px; z-index: 2000; display: none; font-weight: bold; }
</style>
</head>
<body>

<div id="backgroundContainer">
  <div id="glowPrimary" class="glow-orb" style="width: 800px; height: 800px; top: -200px; right: -200px;"></div>
  <div id="glowSecondary" class="glow-orb" style="width: 600px; height: 600px; bottom: -100px; left: -100px;"></div>
  <div id="cursorSpot"></div>
</div>

<div class="container">
  <header>
    <div class="logo-area"><span style="font-size: 2rem;">💦</span><h1 class="logo-text">来泼水吧</h1></div>
    <span class="hero-tag">Bangkok Songkran 2026 · EDC Edition</span>
    <div class="hero-date">📅 APR 10 FRI — APR 14 TUE</div>
  </header>

  <div class="section-title">Stage Select</div>
  <div class="hotel-grid" id="hotelGrid"></div>

  <div class="section-title">Lineup</div>
  <div class="section-sub">手机端：点击名字再点击房间即可分配</div>
  <div id="unassignedArea" class="room-slots room-block" style="min-height: 80px; border-style: solid;"></div>

  <div class="section-title">Room Setup</div>
  <div class="room-container" id="roomContainer"></div>
  <button class="add-room-btn" onclick="addNewRoom()" style="width: 100%; padding: 12px; background: transparent; border: 1px dashed var(--glass-border); color: var(--text-dim); border-radius: 12px; cursor: pointer;">+ ADD NEW ROOM</button>

  <div class="section-title">Credit Radar</div>
  <div class="section-sub">记账与分摊</div>
  <div class="hotel-card" style="padding: 20px; margin-bottom: 120px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
      <input type="text" id="expDesc" class="exp-input" placeholder="项目: 如打车">
      <input type="number" id="expAmount" class="exp-input" placeholder="金额 $">
    </div>
    <select id="expPayer" class="exp-input" style="margin-bottom: 15px;"></select>
    <div id="expParticipants" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;"></div>
    <button onclick="addExpense()" class="summary-btn" style="width: 100%; background: var(--neon-cyan);">记录支出</button>
    <div id="expenseList" style="margin-top: 20px;"></div>
  </div>
</div>

<div class="summary-bar">
  <div style="max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
    <div>
      <div style="font-size: 10px; color: var(--text-dim);">TOTAL COST</div>
      <div id="totalDisplay" style="font-family: Orbitron; font-size: 1.4rem; color: var(--neon-cyan);">$ 0</div>
    </div>
    <button class="summary-btn" onclick="showCostBreakdown()">💰 Settlement</button>
  </div>
</div>

<div id="modalOverlay">
  <div class="modal-content">
    <h2 style="font-family: Orbitron; color: var(--neon-cyan); margin-top: 0;">费用明细</h2>
    <div id="breakdownList"></div>
    <button class="summary-btn" style="width: 100%; margin-top: 20px;" onclick="closeModal()">OK</button>
  </div>
</div>

<div id="toast"></div>

<script>
// --- Data ---
const hotels = [
  { id: 'h1', name: 'W Bangkok', area: 'Silom', price: 1250 },
  { id: 'h2', name: 'The Standard', area: 'Mahanakhon', price: 1400 },
  { id: 'h3', name: 'SO Bangkok', area: 'Lumpini', price: 1100 }
];
const people = [
  { id: 'p1', name: 'Erick', color: 'var(--neon-cyan)' },
  { id: 'p2', name: 'Member 2', color: 'var(--neon-magenta)' },
  { id: 'p3', name: 'Member 3', color: 'var(--neon-pink)' },
  { id: 'p4', name: 'Member 4', color: 'var(--neon-yellow)' },
  { id: 'p5', name: 'Member 5', color: 'var(--neon-green)' },
  { id: 'p6', name: 'Member 6', color: 'var(--neon-orange)' },
  { id: 'p7', name: 'Member 7', color: 'var(--neon-blue)' },
  { id: 'p8', name: 'Member 8', color: 'var(--neon-purple)' },
  { id: 'p9', name: 'Member 9', color: '#fff' }
];

// --- State ---
let selectedHotelId = 'h1';
let rooms = [{ id: 'r1', occupants: ['p1'] }];
let unassigned = people.map(p => p.id).filter(id => id !== 'p1');
let expenses = JSON.parse(localStorage.getItem('bk_exp_v2')) || [];
let selectedPersonId = null; // 手机端点击分配逻辑

function init() {
  renderHotels();
  renderUnassigned();
  renderRooms();
  initExpenseUI();
  renderExpenses();
  updateTotal();
  requestAnimationFrame(updateBackground);
}

// --- Render Logic ---
function renderHotels() {
  document.getElementById('hotelGrid').innerHTML = hotels.map(h => `
    <div class="hotel-card ${h.id === selectedHotelId ? 'selected' : ''}" onclick="selectHotel('${h.id}')">
      <div style="font-weight:bold;">${h.name}</div>
      <div class="price-tag">$${h.price}</div>
    </div>
  `).join('');
}

function selectHotel(id) { selectedHotelId = id; renderHotels(); updateTotal(); }

function getPersonChipHtml(pid, fromId, canRemove = false) {
  const p = people.find(x => x.id === pid);
  const activeClass = selectedPersonId === pid ? 'active-touch' : '';
  return `
    <div class="person-chip ${activeClass}" draggable="true" 
         ondragstart="drag(event, '${pid}')" 
         onclick="handlePersonClick(event, '${pid}')"
         style="border-left: 4px solid ${p.color}">
      ${p.name}
      ${canRemove ? `<span class="remove-btn" onclick="event.stopPropagation(); moveToUnassigned('${pid}', '${fromId}')">✕</span>` : ''}
    </div>
  `;
}

function renderUnassigned() {
  const el = document.getElementById('unassignedArea');
  el.onclick = () => handleTargetClick('unassigned');
  el.innerHTML = unassigned.map(pid => getPersonChipHtml(pid, 'unassigned')).join('');
}

function renderRooms() {
  const container = document.getElementById('roomContainer');
  container.innerHTML = rooms.map((r, i) => `
    <div class="room-block" ondrop="drop(event, '${r.id}')" ondragover="allowDrop(event)" onclick="handleTargetClick('${r.id}')">
      <div style="font-size:10px; color:var(--text-dim); margin-bottom:10px;">ROOM ${i+1}</div>
      <div class="room-slots">
        ${r.occupants.map(pid => getPersonChipHtml(pid, r.id, true)).join('')}
      </div>
    </div>
  `).join('');
}

// --- Interaction (Mobile & Desktop) ---
function handlePersonClick(e, pid) {
  e.stopPropagation();
  selectedPersonId = (selectedPersonId === pid) ? null : pid;
  renderUnassigned();
  renderRooms();
}

function handleTargetClick(targetId) {
  if (!selectedPersonId) return;
  const pid = selectedPersonId;
  unassigned = unassigned.filter(id => id !== pid);
  rooms.forEach(r => r.occupants = r.occupants.filter(id => id !== pid));
  
  if (targetId === 'unassigned') unassigned.push(pid);
  else rooms.find(r => r.id === targetId).occupants.push(pid);
  
  selectedPersonId = null;
  renderUnassigned(); renderRooms(); updateTotal();
}

function allowDrop(e) { e.preventDefault(); }
function drag(e, pid) { selectedPersonId = null; e.dataTransfer.setData("pid", pid); }
function drop(e, targetId) {
  e.preventDefault();
  const pid = e.dataTransfer.getData("pid");
  handleTargetClick(targetId); // 复用点击逻辑处理分配
}

function moveToUnassigned(pid, fromId) {
  rooms.find(r => r.id === fromId).occupants = rooms.find(r => r.id === fromId).occupants.filter(id => id !== pid);
  unassigned.push(pid);
  renderUnassigned(); renderRooms(); updateTotal();
}

function addNewRoom() { rooms.push({ id: 'r'+Date.now(), occupants: [] }); renderRooms(); }

// --- Expense Logic ---
function initExpenseUI() {
  document.getElementById('expPayer').innerHTML = people.map(p => `<option value="${p.id}">${p.name} 垫付</option>`).join('');
  document.getElementById('expParticipants').innerHTML = people.map(p => `
    <label class="part-badge"><input type="checkbox" class="part-check" value="${p.id}" checked><span>${p.name}</span></label>
  `).join('');
}

function addExpense() {
  const desc = document.getElementById('expDesc').value;
  const amt = parseFloat(document.getElementById('expAmount').value);
  const payer = document.getElementById('expPayer').value;
  const parts = Array.from(document.querySelectorAll('.part-check:checked')).map(c => c.value);
  if(!desc || !amt || parts.length === 0) return showToast("信息不全!");
  
  expenses.push({ id: Date.now(), desc, amount: amt, payerId: payer, participants: parts });
  localStorage.setItem('bk_exp_v2', JSON.stringify(expenses));
  renderExpenses(); updateTotal();
  document.getElementById('expDesc').value = ''; document.getElementById('expAmount').value = '';
  showToast("记账成功!");
}

function renderExpenses() {
  const list = document.getElementById('expenseList');
  list.innerHTML = expenses.map(e => `
    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:13px;">
      <div>${e.desc} <br> <small style="color:var(--text-dim)">${people.find(p=>p.id===e.payerId).name} 付款</small></div>
      <div style="text-align:right;">
        <b style="color:var(--neon-yellow)">$${e.amount}</b> 
        <span onclick="deleteExp(${e.id})" style="margin-left:10px; color:var(--text-muted); cursor:pointer;">✕</span>
      </div>
    </div>
  `).join('');
}

function deleteExp(id) { expenses = expenses.filter(e=>e.id!==id); localStorage.setItem('bk_exp_v2', JSON.stringify(expenses)); renderExpenses(); updateTotal(); }

// --- Totals & Modal ---
function updateTotal() {
  const hotel = hotels.find(h => h.id === selectedHotelId);
  const extra = expenses.reduce((s, e) => s + e.amount, 0);
  document.getElementById('totalDisplay').innerText = `$ ${(hotel.price + extra).toFixed(0)}`;
}

function showCostBreakdown() {
  const hotel = hotels.find(h => h.id === selectedHotelId);
  let summary = {};
  people.forEach(p => summary[p.id] = { hotel: 0, extra: 0 });

  rooms.forEach(r => {
    if(r.occupants.length > 0) {
      const share = (hotel.price / rooms.length) / r.occupants.length;
      r.occupants.forEach(pid => summary[pid].hotel += share);
    }
  });

  expenses.forEach(e => {
    const share = e.amount / e.participants.length;
    e.participants.forEach(pid => summary[pid].extra += share);
  });

  document.getElementById('breakdownList').innerHTML = people.map(p => `
    <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
      <span>${p.name}</span>
      <span style="color:var(--neon-cyan); font-family:Orbitron;">$ ${(summary[p.id].hotel + summary[p.id].extra).toFixed(1)}</span>
    </div>
  `).join('');
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function showToast(m) { const t = document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2000); }

// --- BG Animation ---
let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0, hue = 180;
document.addEventListener('mousemove', e => { targetX = e.clientX; targetY = e.clientY; });
function updateBackground() {
  mouseX += (targetX - mouseX) * 0.05; mouseY += (targetY - mouseY) * 0.05;
  const spot = document.getElementById('cursorSpot');
  if(spot) { spot.style.left = (mouseX-250)+'px'; spot.style.top = (mouseY-250)+'px'; }
  requestAnimationFrame(updateBackground);
}

window.onload = init;
</script>
</body>
</html>
